# Web Server Configuration
server.port=8080

# PostgreSQL Connection inside Docker
spring.datasource.url=jdbc:postgresql://db:5432/movie_booking_db
spring.datasource.username=springuser
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate Configuration (Auto-update schema for demo purposes)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Poster upload directory (relative to working directory; served at /img/posters/**)
poster.upload-dir=src/main/resources/static/img/posters

# MailHog Configuration
spring.mail.host=mailhog
spring.mail.port=1025
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

